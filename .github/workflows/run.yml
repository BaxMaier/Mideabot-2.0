jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Code laden
        uses: actions/checkout@v4

      - name: Python installieren
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installieren
        run: pip install requests python-telegram-bot

      - name: Start
        run: python main.py
